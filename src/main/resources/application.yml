spring:
  datasource:
    url: jdbc:h2:tcp://localhost/~/Desktop/SpringProject/minboard
    username: sa
    password:
    driver-class-name: org.h2.Driver
  output:
    ansi:
      enabled: ALWAYS

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true

logging.level:
  org.hibernate.SQL: debug
  root: INFO


